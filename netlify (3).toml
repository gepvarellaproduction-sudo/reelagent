[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Timeout esteso a 26s per la function di ricerca trend (piano Pro)
[functions."trend"]
  timeout = 26

# Aggiorna i trend ogni 24 ore alle 3:00 di notte
[functions."aggiorna-trend"]
  schedule = "0 3 * * *"
